<!doctype html>
<html
  lang="en"
  data-composition-variables='[
    {"id":"text","type":"string","label":"Text","default":"hello what is going on"},
    {"id":"fontSize","type":"number","label":"Font size (px)","default":150},
    {"id":"entryDuration","type":"number","label":"Entry duration (s)","default":0.9},
    {"id":"glowColor","type":"color","label":"Glow color","default":"#7c5cff"}
  ]'
>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=1920, height=1080" />
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      html,
      body {
        margin: 0;
        width: 1920px;
        height: 1080px;
        overflow: hidden;
        background:
          radial-gradient(
            ellipse 60% 50% at 50% 50%,
            rgba(124, 92, 255, 0.18) 0%,
            rgba(15, 12, 32, 0) 70%
          ),
          #0b0a1a;
        font-family: "Outfit", "Inter", sans-serif;
      }
      #stage {
        width: 100%;
        height: 100%;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        padding: 100px 120px;
        gap: 36px;
        position: relative;
      }
      #scanline {
        position: absolute;
        inset: 0;
        background: repeating-linear-gradient(
          0deg,
          rgba(255, 255, 255, 0.012) 0 2px,
          transparent 2px 4px
        );
        pointer-events: none;
      }
      #pre-label {
        font-size: 24px;
        font-weight: 700;
        letter-spacing: 0.45em;
        color: var(--glow, #7c5cff);
        text-transform: uppercase;
        padding: 10px 22px;
        border: 1.5px solid var(--glow, #7c5cff);
        border-radius: 999px;
        opacity: 0.92;
        box-shadow:
          0 0 24px rgba(124, 92, 255, 0.45),
          inset 0 0 12px rgba(124, 92, 255, 0.2);
      }
      #headline {
        font-weight: 800;
        text-align: center;
        line-height: 1.05;
        letter-spacing: -0.015em;
        color: #fbfaff;
        max-width: 1660px;
        will-change: text-shadow, transform;
      }
      #underbar {
        width: 80%;
        height: 3px;
        max-width: 1200px;
        background: linear-gradient(
          90deg,
          transparent,
          var(--glow, #7c5cff),
          transparent
        );
        opacity: 0.7;
      }
    </style>
  </head>
  <body>
    <div
      id="root"
      data-composition-id="glow-neon"
      data-start="0"
      data-duration="10"
      data-width="1920"
      data-height="1080"
    >
      <div id="stage">
        <div id="scanline"></div>
        <div id="pre-label">tonight</div>
        <h1 id="headline"></h1>
        <div id="underbar"></div>
      </div>
    </div>

    <script>
      (function () {
        const vars = window.__hyperframes
          ? window.__hyperframes.getVariables()
          : {
              text: "hello what is going on",
              fontSize: 150,
              entryDuration: 0.9,
              glowColor: "#7c5cff",
            };

        const glow = vars.glowColor || "#7c5cff";
        document.documentElement.style.setProperty("--glow", glow);

        const h = document.getElementById("headline");
        h.textContent = String(vars.text || "");
        h.style.fontSize = vars.fontSize + "px";

        function hexToRgb(hex) {
          const x = hex.replace("#", "");
          return [
            parseInt(x.substring(0, 2), 16),
            parseInt(x.substring(2, 4), 16),
            parseInt(x.substring(4, 6), 16),
          ];
        }
        const [r, g, b] = hexToRgb(glow);
        const baseGlow = (a) => "rgba(" + r + "," + g + "," + b + "," + a + ")";

        const initialShadow = "0 0 8px " + baseGlow(0.25) + ", 0 0 18px " + baseGlow(0.18);
        const fullShadow =
          "0 0 12px " + baseGlow(0.85) +
          ", 0 0 28px " + baseGlow(0.65) +
          ", 0 0 64px " + baseGlow(0.45);
        const pulseShadow =
          "0 0 18px " + baseGlow(1) +
          ", 0 0 40px " + baseGlow(0.75) +
          ", 0 0 96px " + baseGlow(0.5);
        h.style.textShadow = initialShadow;

        window.__timelines = window.__timelines || {};
        const tl = gsap.timeline({ paused: true });

        tl.from(
          "#pre-label",
          { y: -24, opacity: 0, duration: 0.55, ease: "power3.out" },
          0.05,
        );

        tl.from(
          "#headline",
          { scale: 1.04, duration: vars.entryDuration, ease: "expo.out" },
          0.1,
        );
        tl.to(
          "#headline",
          { textShadow: fullShadow, duration: vars.entryDuration, ease: "power2.out" },
          0.1,
        );

        tl.from(
          "#underbar",
          {
            scaleX: 0,
            duration: 0.7,
            ease: "expo.out",
            transformOrigin: "center",
          },
          0.2,
        );

        const pulseCycle = 2.4;
        const pulses = Math.max(1, Math.ceil((10 - 1.5) / pulseCycle) - 1);
        tl.to(
          "#headline",
          {
            textShadow: pulseShadow,
            duration: pulseCycle / 2,
            ease: "sine.inOut",
            yoyo: true,
            repeat: pulses,
          },
          1.5,
        );

        window.__timelines["glow-neon"] = tl;
      })();
    </script>
  </body>
</html>
